<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 基础 -->
    <title>伙伴云企微分享测试 TITLE</title>

    <meta name="description" content="这是 META DESCRIPTION，用于测试企微聊天卡片是否读取 description。" />

    <meta name="keywords" content="伙伴云,企微,分享卡片,OG测试" />

    <!-- Schema.org -->
    <meta itemprop="name" content="伙伴云企微分享测试 ITEMPROP NAME" />

    <meta itemprop="description" content="这是 ITEMPROP DESCRIPTION，用于测试 Google Schema / crawler。" />

    <meta itemprop="image" content="https://你的域名/og.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="TWITTER TITLE" />

    <meta name="twitter:description" content="TWITTER DESCRIPTION" />

    <meta name="twitter:image" content="https://你的域名/og.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="OG TITLE" />

    <meta property="og:description" content="OG DESCRIPTION" />

    <meta property="og:site_name" content="伙伴云测试站" />

    <meta property="og:url" content="https://你的域名/test.html" />

    <meta property="og:image" content="https://你的域名/og.png" />

    <meta property="og:image:type" content="image/png" />

    <meta property="og:image:width" content="300" />

    <meta property="og:image:height" content="300" />

    <meta property="og:type" content="article" />

    <!-- 微信 / 企微 -->
    <meta property="weixin:timeline_title" content="WEIXIN TIMELINE TITLE" />

    <meta property="weixin:chat_title" content="WEIXIN CHAT TITLE" />

    <meta property="weixin:description" content="WEIXIN DESCRIPTION" />

    <meta property="weixin:image" content="https://你的域名/og.png" />
</head>

<body style="font-family: sans-serif; padding: 40px;">
    <h1>伙伴云企微分享测试页</h1>

    <p>
        这是 BODY 正文内容。
    </p>

    <p>
        用于测试：
    </p>

    <ul>
        <li>title</li>
        <li>meta description</li>
        <li>Open Graph</li>
        <li>Twitter Card</li>
        <li>weixin meta</li>
        <li>企微 URL 卡片</li>
        <li>微信分享卡片</li>
        <li>crawler 行为</li>
    </ul>
</body>

</html>
